<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Dream Tees</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f7f7f5;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

  /* HEADER */
  .header{background:#fff;border-bottom:1px solid #e5e5e3;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:#1a1a1a;}
  .logo span{color:#c41230;}
  .logo sub{font-family:'Inter',sans-serif;font-size:0.55rem;font-weight:400;color:#888;display:block;letter-spacing:1px;text-transform:uppercase;margin-top:-2px;}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 20px;gap:20px;}

  .tagline{font-size:0.78rem;color:#888;text-align:center;letter-spacing:1px;text-transform:uppercase;}

  /* PROMPT AREA */
  .prompt-card{width:100%;background:#fff;border:1px solid #e5e5e3;border-radius:6px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .prompt-label{font-size:0.68rem;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  textarea{width:100%;border:1.5px solid #e5e5e3;border-radius:4px;padding:12px;font-family:'Inter',sans-serif;font-size:0.95rem;color:#1a1a1a;resize:none;outline:none;line-height:1.5;transition:border-color 0.2s;}
  textarea:focus{border-color:#c41230;}
  textarea::placeholder{color:#bbb;}

  /* QUALITY TOGGLE */
  .quality-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .quality-label{font-size:0.68rem;color:#888;font-weight:600;}
  .quality-btns{display:flex;gap:0;border:1px solid #e5e5e3;border-radius:20px;overflow:hidden;}
  .q-btn{padding:5px 14px;font-size:0.68rem;font-weight:700;border:none;cursor:pointer;background:transparent;color:#888;transition:all 0.15s;letter-spacing:0.5px;}
  .q-btn.active{background:#c41230;color:#fff;}

  /* GENERATE BUTTON */
  .gen-btn{width:100%;padding:16px;background:#c41230;border:none;border-radius:4px;color:#fff;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s;margin-top:14px;}
  .gen-btn:active{background:#a00f24;}
  .gen-btn svg{flex-shrink:0;}

  /* API KEY */
  .key-row{display:flex;align-items:center;gap:6px;margin-top:10px;}
  .key-dot{width:8px;height:8px;border-radius:50%;background:#e5e5e3;}
  .key-dot.set{background:#16a34a;}
  .key-link{font-size:0.7rem;color:#888;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;}

  /* RESULT OVERLAY */
  .overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.85);flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto;}
  .overlay.open{display:flex;}
  .overlay-header{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .overlay-title{color:#fff;font-family:'Playfair Display',serif;font-size:1rem;}
  .close-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .result-img{width:100%;max-width:500px;border-radius:6px;display:block;}
  .overlay-actions{display:flex;gap:10px;margin-top:16px;width:100%;max-width:500px;}
  .overlay-btn{flex:1;padding:13px;border:none;border-radius:4px;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
  .overlay-btn.primary{background:#c41230;color:#fff;}
  .overlay-btn.ghost{background:rgba(255,255,255,0.15);color:#fff;}

  /* LOADING */
  .loading-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .loading-overlay.open{display:flex;}
  .spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{color:#fff;font-size:0.9rem;font-weight:600;letter-spacing:0.5px;}
  .loading-sub{color:rgba(255,255,255,0.6);font-size:0.75rem;}

  /* API KEY MODAL */
  .modal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.6);align-items:flex-end;justify-content:center;}
  .modal.open{display:flex;}
  .modal-box{background:#fff;width:100%;max-width:500px;border-radius:12px 12px 0 0;padding:24px 20px 36px;}
  .modal-title{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:6px;}
  .modal-title span{color:#c41230;}
  .modal-sub{font-size:0.78rem;color:#888;margin-bottom:16px;line-height:1.5;}
  .modal-input{width:100%;border:1.5px solid #e5e5e3;border-radius:4px;padding:12px;font-family:monospace;font-size:0.85rem;outline:none;margin-bottom:12px;}
  .modal-input:focus{border-color:#c41230;}
  .modal-btn{width:100%;padding:14px;background:#c41230;border:none;border-radius:4px;color:#fff;font-weight:700;font-size:0.85rem;letter-spacing:1px;cursor:pointer;text-transform:uppercase;}

  /* DEV PROMPT */
  .dev-panel{width:100%;max-width:500px;margin-top:12px;border:1px solid #e2c97e;border-radius:4px;background:#fffbeb;overflow:hidden;display:none;}
  .dev-panel.show{display:block;}
  .dev-header{padding:8px 12px;font-size:0.65rem;font-weight:700;color:#92400e;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .dev-body{padding:10px 12px;border-top:1px solid #e2c97e;font-family:monospace;font-size:0.68rem;color:#444;line-height:1.6;word-break:break-word;}
</style>
</head>

<script>
function unlock(){
  if(document.getElementById('pw').value==='Tees55dream07'){
    localStorage.setItem('dt_mobile_auth','ok');
    document.getElementById('lock').remove();
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
  }
}
document.getElementById('pw').addEventListener('keyup',function(e){if(e.key==='Enter')unlock();});
if(localStorage.getItem('dt_mobile_auth')==='ok'){
  document.getElementById('lock').style.display='none';

<div class="header">

<!-- API KEY MODAL -->
<div class="modal" id="keyModal">

<script>
var quality = 'medium';
var currentColor = 'White';
var currentPlacement = 'front';
var currentStyle = '';
var currentQualityMode = 'medium';
var QUALITY_COSTS = {low:0.011, medium:0.042, high:0.167};
var COSTS = {low:0.011, medium:0.042, high:0.167};

// ── QUALITY TOGGLE ──
function setQ(mode) {
  quality = mode;
  currentQualityMode = mode;
  var map = {low:'qLow', medium:'qMed', high:'qHigh'};
  Object.keys(map).forEach(function(m) {
    var btn = document.getElementById(map[m]);
    if(btn) btn.className = 'q-btn' + (m === mode ? ' active' : '');
  });
}

// ── API KEY ──
function getKey() { return localStorage.getItem('dt_openai_key'); }
function saveKey() {
  var v = document.getElementById('keyInput').value.trim();
  if(!v) return;
  localStorage.setItem('dt_openai_key', v);
  document.getElementById('keyModal').classList.remove('open');
  updateKeyDot();
}
function showKeyModal() {
  var existing = getKey();
  if(existing) document.getElementById('keyInput').value = existing;
  document.getElementById('keyModal').classList.add('open');
}
function updateKeyDot() {
  var dot = document.getElementById('keyDot');
  if(dot) dot.className = 'key-dot' + (getKey() ? ' set' : '');
}
document.addEventListener('DOMContentLoaded', function() {
  var bt = document.getElementById('buildTime');
  if(bt) bt.textContent = new Date().toISOString().slice(0,16).replace('T',' ') + ' UTC';
  var km = document.getElementById('keyModal');
  if(km) km.addEventListener('click', function(e) {
    if(e.target === this) this.classList.remove('open');
  });
  updateKeyDot();
});

// ── FULL PROMPT ENGINE ──
var RENDER_PRESETS = {
  'premium-sportswear': 'premium commercial sportswear illustration, elite athletic apparel graphic quality, modern sports-brand rendering, dynamic layered composition, advanced lighting and shadow depth, vivid high-contrast color separation, dimensional highlights, professional apparel print hierarchy, cinematic energy, commercial print-ready detail, premium mascot illustration quality, realistic material lighting, polished production value, aggressive focal clarity, modern vector-airbrush hybrid rendering',
  'vintage-graphic':    'authentic vintage apparel graphic, aged halftone texture, limited color screenprint aesthetic, worn distressed ink quality, retro hand-pressed feel, classic garment art, nostalgic era-accurate rendering, faded ink authenticity',
  'streetwear':         'high-end streetwear graphic treatment, clean readable typography integration, visually striking chest-print composition, urban fashion energy, bold editorial confidence, premium brand-quality illustration, modern graphic apparel aesthetic',
  'skate-brand':        'authentic skate brand graphic quality, raw street energy, bold ink confidence, DIY-meets-premium aesthetic, dynamic action illustration, skate culture visual language, graphic punch and attitude',
  'heavy-metal-poster': 'dramatic heavy metal poster art quality, aggressive dark energy, bold skull or creature rendering, gothic lettering integration, high contrast ink drama, concert tee authenticity, dark atmosphere and visual power',
  'retro-airbrush':     'retro airbrush illustration quality, smooth gradient blending, vivid saturated colors, 80s van art energy, neon accent highlights, nostalgic spray-painted aesthetic, chrome and glow effects',
  'anime-studio':       'anime studio illustration quality, clean cel-shaded rendering, bold expressive linework, vivid color blocking, dynamic pose energy, manga-influenced composition, professional animation cel quality',
  'luxury-editorial':   'luxury fashion editorial illustration, refined typographic hierarchy, elevated aesthetic confidence, high-fashion apparel quality, sophisticated color palette, premium brand visual language, editorial photography energy',
  'cinematic':          'cinematic photorealistic rendering, dramatic professional lighting, volumetric depth, premium production quality, film-grade color grading, high-detail surface rendering, commercial photography aesthetic'
};

var designIntent = {
  style: '',        // e.g. 'vintage distressed screenprint', 'cinematic photorealistic'
  mood: '',         // e.g. 'aggressive', 'playful', 'dark', 'energetic'
  audience: '',     // e.g. 'skater', 'bowler', 'gym', 'biker'
  placement: 'center-chest', // 'center-chest', 'left-chest', 'full-front', 'back'
  textMode: 'none', // 'none', 'integrated', 'editable-later'
  subject: '',
  teamName: '',
  mascot: '',
  colors: ''
};

function resetDesignIntent() {
  designIntent = {
    style: '', mood: '', audience: '', placement: 'center-chest',
    textMode: 'none', subject: '', teamName: '', mascot: '', colors: ''
  }

function getApparelEnhancement(idea, lower) {
  var result = { prompt: '', archetype: '', energy: '', elements: [] };

  // ── 1. EMOTIONAL ENERGY ──
  var energy = '';
  if(lower.match(/opera|singer|perform|music|band|concert|jazz|soul/)) energy = 'dramatic';
  else if(lower.match(/skull|dark|death|horror|metal|grim|vampire|goth/)) energy = 'eerie';
  else if(lower.match(/shark|wolf|tiger|lion|eagle|fierce|beast|warrior/)) energy = 'aggressive';
  else if(lower.match(/vintage|retro|classic|old school|nostalgic/)) energy = 'nostalgic';
  else if(lower.match(/skate|punk|rebel|street|graffiti/)) energy = 'rebellious';
  else if(lower.match(/cute|bunny|cat|kawaii|fun|funny|silly/)) energy = 'playful';
  else if(lower.match(/luxury|premium|fashion|editorial|elegant/)) energy = 'premium';
  else if(lower.match(/space|galaxy|cosmic|cinematic|epic|dragon|fantasy/)) energy = 'cinematic';
  else if(lower.match(/surf|beach|wave|ocean|summer/)) energy = 'free';
  else if(lower.match(/gym|lift|hustle|grind|beast|power|strong/)) energy = 'powerful';
  else energy = 'bold';
  result.energy = energy;

  // ── 2. APPAREL ARCHETYPE ──
  var archetype = '';
  if(lower.match(/bowling|team|squad|league|club/)) archetype = 'mascot';
  else if(lower.match(/skate|street|urban|graffiti/)) archetype = 'streetwear';
  else if(lower.match(/vintage|retro|classic/)) archetype = 'vintage';
  else if(lower.match(/metal|punk|dark|skull|death/)) archetype = 'metal';
  else if(lower.match(/race|speed|motor|car|moto/)) archetype = 'racing';
  else if(lower.match(/luxury|fashion|editorial/)) archetype = 'luxury';
  else if(lower.match(/surf|beach|wave/)) archetype = 'surf';
  else if(lower.match(/anime|manga/)) archetype = 'anime';
  else if(lower.match(/minimal|simple|clean/)) archetype = 'minimalist';
  else if(lower.match(/opera|singer|jazz|performer|musician/)) archetype = 'editorial';
  else archetype = 'graphic';
  result.archetype = archetype;

  // ── 3. COMPOSITION ENHANCEMENT — supporting elements ──
  var elements = [];

  // Subject-specific supporting elements that reinforce the emotional idea
  if(lower.match(/opera|singer|vocalist|perform/)) {
    elements.push('vintage microphone stand', 'dramatic single spotlight from above', 'distressed open border frame', 'vertical chest composition');
  } else if(lower.match(/bowling/) && lower.match(/shark|wolf|bear|eagle|mascot/)) {
    elements.push('water splash explosion', 'bowling pins scattering', 'motion speed lines', 'bold chest-filling vertical composition');
  } else if(lower.match(/guitar|guitarist|rock|band/)) {
    elements.push('electric spark detail', 'stage lighting rays', 'motion blur on strings');
  } else if(lower.match(/wolf|howl/)) {
    elements.push('full moon backdrop', 'atmospheric mist', 'forest silhouette');
  } else if(lower.match(/eagle|hawk|falcon/)) {
    elements.push('spread wings at full span', 'dramatic sky atmosphere', 'talons extended');
  } else if(lower.match(/skull/)) {
    elements.push('dramatic shadow depth', 'subtle decay detail', 'strong symmetrical composition');
  } else if(lower.match(/car|camaro|mustang|truck|muscle/)) {
    elements.push('motion speed lines', 'subtle smoke or tire marks', 'dramatic low angle perspective');
  } else if(lower.match(/surf|wave/)) {
    elements.push('curling wave energy', 'water spray detail', 'sun rays through water');
  } else if(lower.match(/space|astronaut|galaxy/)) {
    elements.push('nebula atmosphere', 'star field depth', 'dramatic light source');
  }

  result.elements = elements;

  // ── 4. WEARABILITY DIRECTION ──
  var wearability = '';
  if(archetype === 'editorial' || energy === 'dramatic') {
    wearability = 'Strong vertical silhouette optimized for chest placement. Emotionally immediate — recognizable and striking at a glance. Designed to feel intentional, not accidental.';
  } else if(archetype === 'mascot' || energy === 'aggressive') {
    wearability = 'Dominant mascot silhouette that fills the chest with confidence. Instantly readable identity. The kind of shirt someone wears with pride.';
  } else if(archetype === 'vintage' || energy === 'nostalgic') {
    wearability = 'Authentic vintage feel with strong graphic identity. Looks like it belongs on a premium garment, not a generic print.';
  } else if(archetype === 'minimalist') {
    wearability = 'Confidently minimal — not accidentally plain. Strong negative space used with intention. Premium restraint.';
  } else {
    wearability = 'Scroll-stopping apparel graphic. Strong silhouette, clear emotional identity, designed to be worn with confidence.';
  }

  // ── BUILD ENHANCEMENT PROMPT ──
  var parts = [];

  if(elements.length > 0) {
    parts.push('Supporting elements that reinforce the concept: ' + elements.join(', ') + '.');
  }

  parts.push(wearability);

  // Energy amplification — strongest wearable expression, not loudest
  var energyMap = {
    dramatic:   'Amplify the dramatic energy — make it feel like a moment, not just an image. Theatrical, memorable, emotionally immediate.',
    aggressive: 'Amplify the aggressive energy — fierce, confident, physically powerful. The kind of shirt that commands attention.',
    nostalgic:  'Amplify the nostalgic warmth — authentic, earned, emotionally resonant. Feels like a classic, not a reproduction.',
    eerie:      'Amplify the eerie atmosphere — dark, intentional, hauntingly beautiful. Unsettling in the best possible way.',
    rebellious: 'Amplify the rebellious attitude — raw, confident, anti-establishment energy. Wear it like a statement.',
    playful:    'Amplify the playful energy — fun, expressive, immediately likeable. Should make people smile.',
    premium:    'Amplify the premium feel — refined, confident, luxuriously restrained. Elevated without being cold.',
    cinematic:  'Amplify the cinematic scale — epic, vast, emotionally overwhelming. Like a movie poster you want to wear.',
    free:       'Amplify the free-spirited energy — open, sun-drenched, effortlessly cool. Born to be outside.',
    powerful:   'Amplify the raw power — strength, determination, unstoppable force. Wear it when you mean business.',
    bold:       'Find the strongest wearable expression of this idea. Make it something someone would stop scrolling for.'
  };
  parts.push(energyMap[energy] || energyMap.bold);

  // Quality self-evaluation — Dream Tees success metric
  parts.push('Design goal: the customer\'s first reaction should be "Wow. I\'d wear that." — not "that\'s what I typed." Optimize for wearability, identity, emotional impact, and commercial desirability over literal accuracy. This is a shirt design, not an AI image.');

  result.prompt = parts.join(' ');
  return result;
}

// Pick a concept family — rotates to ensure variety across generations
function pickConceptFamily(activityKey) {
  var families = CONCEPT_FAMILIES[activityKey];
  if(!families || !families.length) return null;
  // Use time-based rotation for variety — changes every 8 seconds
  var idx = Math.floor(Date.now() / 8000) % families.length;
  return families[idx];
}

// Build the full design system from a concept family
function buildConceptFamilyPrompt(activityKey, rawIdea) {
  var family = pickConceptFamily(activityKey);
  if(!family) return null;

  // Pick phrase from family
  var phraseIdx = Math.floor(Date.now() / 3000) % family.phrases.length;
  var phrase = family.phrases[phraseIdx];

  // Store for UI display
  window._activeConceptFamily = family.name;
  window._activePhrase = phrase;

  var prompt =
    family.artDirection + ' ' +
    'Phrase to integrate: "' + phrase + '" — in ' + family.typography + '. ' +
    'Palette: ' + family.palette + '. ' +
    'Composition: ' + family.composition + '. ' +
    'Texture: ' + family.texture + '. ' +
    'The phrase describes the identity of the person wearing this shirt — confident, bold, slightly conceited. ' +
    'Integrate it naturally into the composition, not floating on top. ' +
    'Premium apparel quality. Chest-filling composition. ' +
    'CRITICAL: Pure white or transparent background only. No black or dark backgrounds. ' +
    'No mockup. No shirt shape.';

  return prompt;
}

// Extended pickConceptFamily with true randomness
function pickConceptFamily(activityKey) {
  var families = CONCEPT_FAMILIES[activityKey];
  if(!families || !families.length) return null;
  // True random weighted away from last used — feels organic not scheduled
  var lastFamily = window._lastConceptFamily || null;
  var eligible = families.filter(function(f){ return f.name !== lastFamily; });
  var pool = eligible.length > 0 ? eligible : families;
  var chosen = pool[Math.floor(Math.random() * pool.length)];
  window._lastConceptFamily = chosen.name;
  return chosen;
}

// Detect emotional core from prompt context
function detectIdentityCore(lower) {
  if(lower.match(/\bperfect\b|\b300\b|\bchampion\b|\bwinner\b|\brecord\b|\bbest\b|\btrophy\b|\bgold\b/))
    return 'achievement';
  if(lower.match(/\bmy\b|\bmine\b|\bown\b|\bdominate\b|\bcontrol\b|\bking\b|\bqueen\b/))
    return 'ownership';
  if(lower.match(/\bnever\b|\bcan.?t stop\b|\brefuse\b|\bdefiant\b|\brebel\b|\bban\b|\bdoubt\b/))
    return 'defiance';
  if(lower.match(/\bmaster\b|\bprecision\b|\bskill\b|\btechnique\b|\bcraft\b|\bart\b/))
    return 'mastery';
  if(lower.match(/\bobsess\b|\baddicted\b|\balways\b|\beveryday\b|\bnonstop\b|\b24\b|\b7\b/))
    return 'obsession';
  if(lower.match(/\bfree\b|\bfreedom\b|\bopen\b|\bwild\b|\bnature\b|\bwind\b|\bsoul\b/))
    return 'freedom';
  if(lower.match(/\blegacy\b|\byears\b|\bstill\b|\bveteran\b|\bold school\b|\bforever\b/))
    return 'legacy';
  // Default — rotate through the most powerful cores
  var cores = ['defiance', 'ownership', 'achievement', 'mastery', 'obsession'];
  return cores[Math.floor(Date.now() / 5000) % cores.length];
}

function getIdentityPhrase(activityKey, rawIdea) {
  var coreData = IDENTITY_CORES[activityKey];
  if(!coreData) return null;
  var core = detectIdentityCore((rawIdea || '').toLowerCase());
  var phrases = coreData[core] || coreData['defiance'] || coreData['achievement'];
  if(!phrases || !phrases.length) return null;
  // Rotate within the core's phrases
  return phrases[Math.floor(Date.now() / 3000) % phrases.length];
}

function parseIdeaMobile(rawIdea) {
  var lower = rawIdea.toLowerCase();
  var result = { subjects:[], location:null, activitySubject:null, colors:[], isSimple:false, explicitStyle:null };

  result.isSimple = !!lower.match(/\b(vector|flat|minimal|simple|logo|icon|clean)\b/);

  // Explicit style
  if(lower.match(/\bwatercolor\b/)) result.explicitStyle = 'watercolor illustration';
  else if(lower.match(/\bcartoon\b/)) result.explicitStyle = 'bold cartoon illustration';
  else if(lower.match(/\bretro\b|\bvintage\b/)) result.explicitStyle = 'vintage screenprint aesthetic';
  else if(lower.match(/\banime\b/)) result.explicitStyle = 'anime illustration style';
  else if(lower.match(/\brealistic\b|\bcinematic\b/)) result.explicitStyle = 'cinematic photorealistic rendering';

  // Animals with word boundaries
  KNOWN_ANIMALS_MOBILE.forEach(function(a) {
    var re = new RegExp('\\b' + a + '\\b', 'i');
    if(re.test(lower)) result.subjects.push({type:'animal', value:a});
  });

  // Vehicles with word boundaries
  KNOWN_VEHICLES_MOBILE.forEach(function(v) {
    var re = new RegExp('\\b' + v.replace(/\s+/g,'\\s+') + '\\b', 'i');
    if(re.test(lower)) result.subjects.push({type:'vehicle', value:v});
  });

  // Location
  for(var i=0;i<KNOWN_LOCATIONS_MOBILE.length;i++){
    if(lower.indexOf(KNOWN_LOCATIONS_MOBILE[i])!==-1){result.location=KNOWN_LOCATIONS_MOBILE[i];break;}
  }

  // Activity
  Object.keys(ACTIVITY_SUBJECTS_MOBILE).forEach(function(act){
    var re = new RegExp('\\b' + act + '\\b','i');
    if(re.test(lower)) result.activitySubject = {subject:act, elements:ACTIVITY_SUBJECTS_MOBILE[act]};
  });

  // Colors
  ['red','blue','green','black','white','yellow','orange','purple','pink','gold','silver','navy','teal','neon'].forEach(function(c){
    if(lower.indexOf(c)!==-1) result.colors.push(c);
  });

  return result;
}

  var enhanced = !userRequestedSimple

    : { prompt: 'Clean, minimal, and intentional. Confidently simple — strong negative space, clear focal point.', archetype: 'minimalist', energy: 'premium', elements: [] };
  designIntent.enhancement = enhanced;

function getSubjectPromptLayer(rawIdea) {
  var lower = rawIdea.toLowerCase();
  var tn = designIntent.teamName || extractTeamName(rawIdea);
  var mc = designIntent.mascot || extractMascot(lower);
  var colors = designIntent.colors;
  var typo = getTypographyForStyle(designIntent.style);

  if(mc && tn) {
    var action = lower.match(/bowling/) ? 'gripping a bowling ball smashing pins with water splash' :
                 lower.match(/basketball/) ? 'dunking a basketball with explosive force' :
                 lower.match(/baseball/) ? 'swinging a bat at full power' :
                 lower.match(/soccer|football/) ? 'kicking a ball with full momentum' :
                 'in explosive athletic action';
    var textLine = designIntent.textMode === 'integrated'
      ? '"' + tn + '" in ' + typo + ', large readable team lettering fully integrated into composition'
      : designIntent.textMode === 'editable-later'
        ? 'leave deliberate negative space for "' + tn + '" team name to be added as editable text'
        : '';
    return mc + ' mascot ' + action +
      (textLine ? ', ' + textLine : '') +
      ', no additional text beyond what is specified' +
      (colors ? ', strict ' + colors + ' color palette — no other colors' : '');
  }
  if(tn) {
    return '"' + tn + '" ' +
      (designIntent.textMode === 'integrated' ? 'bold team name as dominant visual element, ' + typo : 'apparel graphic') +
      (colors ? ', ' + colors + ' color palette' : '');
  }
  if(mc) {
    return mc + ' — ' + rawIdea +
      ', fierce dynamic pose, intense expression, strong silhouette' +
      (colors ? ', ' + colors + ' color palette' : '');
  }
  return rawIdea + (colors ? ', ' + colors + ' color palette' : '');
}

function getTextSafetyLayer() {
  if(designIntent.textMode === 'none') return 'No text. No lettering. No words. No numbers anywhere in the design.';
  if(designIntent.textMode === 'editable-later') return 'No generated text. Leave clean open space for editable text to be added later.';
  return 'All text must be large, bold, and fully legible. No small or decorative unreadable text. Only include text explicitly specified — do not add slogans, taglines, or extra words.';
}

function getTypographyForStyle(style) {
  if(!style) return 'bold apparel lettering';
  if(style.match(/vintage|distressed|retro/)) return 'arched varsity lettering in distressed athletic font';
  if(style.match(/cinematic|photo|realistic|3d/)) return 'clean bold modern typography';
  if(style.match(/neon|electric/)) return 'glowing neon lettering';
  if(style.match(/minimal/)) return 'clean sans-serif lettering';
  if(style.match(/cartoon/)) return 'bold outlined cartoon lettering';
  if(style.match(/grunge|gritty|punk|metal/)) return 'rough distressed lettering';
  if(style.match(/luxury|fashion/)) return 'elegant serif typography';
  if(style.match(/graffiti/)) return 'bold graffiti lettering';
  return 'bold apparel lettering';
}

function getBackgroundForStyle(style) {
  if(!style) return '';
  if(style.match(/vintage|distressed|retro/)) return 'aged distressed print texture inside the artwork only, no separate background';
  if(style.match(/neon|electric/)) return 'dark atmospheric lighting inside the artwork only, no separate background';
  if(style.match(/cinematic|photo/)) return 'dramatic cinematic lighting within the subject, no separate background';
  if(style.match(/grunge|gritty|metal|punk/)) return 'rough ink texture inside the artwork only, no separate background';
  return '';
}

function getSystemPromptLayer() {
  return 'Transparent background. Pure white background. No mockup. No shirt shape. No folded fabric. No watermark. No extra limbs. No distorted faces. No border rectangle.';
}

function getPrintPromptLayer() {
  var placement = currentPlacement === 'both' ? 'Full front and back print.' : 'Large chest-filling front print.';
  return placement + ' Designed for a ' + (currentColor || 'white').toLowerCase() + ' shirt.';
}

function getStylePromptLayer() {
  var preset = detectRenderPreset();
  var presetDNA = RENDER_PRESETS[preset] || RENDER_PRESETS['premium-sportswear'];
  var userStyle = designIntent.style;
  var bg = userStyle ? getBackgroundForStyle(userStyle) : '';
  return presetDNA + (bg ? ', ' + bg : '') + '.';
}

function getRefinementLayer() {
  var lower = (designIntent.audience || '') + ' ' + (designIntent.style || '');
  var mascot = designIntent.mascot || '';
  var hasMascot = !!mascot;
  var hasTeam = !!designIntent.teamName;

  // SUBJECT / SCENE DETAIL — what naturally belongs to this subject
  var subjectDetail = '';
  if(mascot.match(/shark/)) {
    subjectDetail = 'Add natural shark-specific detail: smooth skin surface, sharp tooth definition, intense eye detail, realistic fin edge shading, subtle skin sheen. Water splash droplets, foam, motion spray around the impact. Bowling ball scuffs and surface wear. Pin impact marks and scatter realism.';
  } else if(mascot.match(/wolf|bear|lion|tiger|fox|panther/)) {
    subjectDetail = 'Add natural fur texture, intense eye detail, claw definition, muscle mass shading under fur. Motion and energy detail appropriate to the pose.';
  } else if(mascot.match(/eagle|hawk|falcon|raven/)) {
    subjectDetail = 'Add natural feather layering detail, sharp talon definition, intense eye focus, wing spread energy detail.';
  } else if(mascot.match(/dragon/)) {
    subjectDetail = 'Add scale texture detail, claw sharpness, fire or smoke breakup, eye intensity, wing membrane detail.';
  } else if(mascot.match(/skull/)) {
    subjectDetail = 'Add bone surface detail, eye socket depth, subtle surface wear, crack definition where appropriate.';
  } else if(hasMascot) {
    subjectDetail = 'Add natural subject-specific detail: surface texture appropriate to the subject, eye intensity, motion energy, and material realism. Details should belong naturally to the subject.';
  } else {
    subjectDetail = 'Add subtle scene-appropriate detail: material surface realism, lighting depth, and motion energy where present.';
  }

  // TYPOGRAPHY DETAIL — treated separately from illustration
  var typographyDetail = hasTeam
    ? 'Treat text as typography, not illustration. Preserve exact spelling, letter shapes, spacing, and hierarchy. Add only controlled print-production character: crisp outlines, subtle ink grain, slight edge wear, mild screenprint texture, small fill variation. Do not distort, crack, smear, or alter letter shapes.'
    : 'Preserve all text exactly as specified. Typography must remain fully readable with clean edges.';

  // GLOBAL CONTROL — always present
  var globalControl = 'Preserve the core composition, silhouettes, and readability. All details should look carefully designed into the subject, not pasted over the image as filters. Do not add brush strokes, canvas texture, oil-paint texture, watercolor bleeding, smeared shading, random cracks, missing letter chunks, or painterly surface effects unless the user specifically requested a painted style.';

  return [subjectDetail, typographyDetail, globalControl].join(' ');
}

function getCreativeAmplificationLayer() {
  var hasMascot = !!designIntent.mascot;
  var hasTeam = !!designIntent.teamName;
  var audience = designIntent.audience;

  var composition = '';
  if(hasMascot && hasTeam) {
    composition = 'oversized mascot exploding off the chest, layered action composition, dynamic motion lines, aggressive anatomy with detailed fins teeth and eyes, premium sportswear hierarchy, fearless apparel composition, confident negative space usage, strong central silhouette, iconic apparel graphic hierarchy';
  } else if(hasMascot) {
    composition = 'oversized mascot filling the shirt, dominant chest artwork, explosive energy, detailed character rendering, strong visual impact, fearless apparel composition, confident negative space usage, strong central silhouette, iconic apparel graphic hierarchy';
  } else if(hasTeam) {
    composition = 'bold typographic composition, dominant team name, layered apparel hierarchy, strong visual confidence, fearless apparel composition, iconic apparel graphic hierarchy';
  } else {
    composition = 'shirt-filling composition, dominant focal point, fearless apparel composition, confident negative space usage, strong central silhouette, iconic apparel graphic hierarchy';
  }

  var energy = '';
  if(audience === 'bowler' || audience === 'sports team') energy = 'aggressive athletic energy, dynamic water splash effects, powerful motion, commercial sportswear confidence';
  else if(audience === 'skater') energy = 'rebellious street energy, raw visual attitude, fearless composition';
  else if(audience === 'surfer') energy = 'fluid wave energy, sun-bleached confidence, coastal lifestyle feel';
  else if(audience === 'biker') energy = 'raw power, heavy iron attitude, intimidating visual presence';
  else if(audience === 'gym') energy = 'raw motivational power, physical intensity, bold activewear energy';
  else energy = 'bold visual impact, commercial apparel energy, strong focal confidence';

  return composition + '. ' + energy + '.';
}

function detectStyle(lower) {
  if(lower.match(/watercolor|painted/)) return 'watercolor illustration';
  if(lower.match(/photo|realistic|cinematic|hyperrealistic/)) return 'cinematic photorealistic';
  if(lower.match(/3d|cgi|render/)) return '3D render';
  if(lower.match(/minimal|simple|clean/)) return 'clean minimalist graphic';
  if(lower.match(/cartoon|comic/)) return 'bold cartoon illustration';
  if(lower.match(/vintage|retro|distressed|old school/)) return 'vintage distressed screenprint';
  if(lower.match(/neon|glow|electric|synthwave/)) return 'vivid neon graphic';
  if(lower.match(/sketch|hand.drawn/)) return 'hand-drawn ink illustration';
  if(lower.match(/grunge|punk|metal|rock/)) return 'gritty distressed screenprint';
  if(lower.match(/luxury|fashion|high.end/)) return 'luxury fashion graphic';
  if(lower.match(/graffiti|street art/)) return 'graffiti street art';
  return ''; // neutral — let subject drive
}

function detectColors(lower) {
  var colorWords = ['red','blue','green','black','white','yellow','orange','purple','pink','gold','silver','navy','crimson','teal','brown','grey','gray'];
  var found = colorWords.filter(function(c){ return lower.indexOf(c) !== -1; });
  return found.length > 0 ? found.join(', ') : '';
}

function detectAudience(lower) {
  if(lower.match(/bowling/)) return 'bowler';
  if(lower.match(/skate/)) return 'skater';
  if(lower.match(/surf/)) return 'surfer';
  if(lower.match(/gym|fitness|crossfit/)) return 'gym';
  if(lower.match(/biker|motorcycle/)) return 'biker';
  if(lower.match(/team|sport|league/)) return 'sports team';
  return '';
}

function classifyTextMode(lower) {
  if(lower.match(/no text|without text/)) return 'none';
  if(lower.match(/team|club|crew|bowling|sport|league|mascot|varsity|athletic/)) return 'integrated';
  if(lower.match(/exact|slogan|quote|brand|logo/)) return 'editable-later';
  return 'none';
}

function classifyApparel(lower) {
  if(lower.match(/team|club|crew|squad|league|bowling|sport|gym|biker|motorcycle|racing|surf|skate|mascot|varsity/)) return 'text-integrated';
  if(lower.match(/photo|realistic|cinematic|fantasy|nature|space|abstract/)) return 'art-first';
  return 'art-first';
}

function extractTeamName(idea) {
  var m = idea.match(/(?:the\s+)((?:[A-Z][a-z]+\s+)+(?:[A-Z][a-z]+))/i);
  if(m) return m[1].trim();
  m = idea.match(/(?:for\s+(?:my\s+|the\s+)?)((?:[A-Z][a-z]+\s+)+(?:[A-Z][a-z]+))/i);
  if(m) return m[1].trim();
  m = idea.match(/team\s+((?:[A-Z][a-z]+\s*)+)/);
  if(m) return m[1].trim();
  return null;
}

function extractMascot(lower) {
  var mascots = ['shark','wolf','eagle','bear','lion','tiger','dragon','fox','snake','hawk','bull','panther','gator','cobra','falcon','owl','raven','mustang','hornet','wasp','viper'];
  for(var i=0; i<mascots.length; i++) {
    if(lower.indexOf(mascots[i]) !== -1) return 'a ' + mascots[i];
  }
  return null;
}

function detectRenderPreset() {
  var style = designIntent.style || '';
  var audience = designIntent.audience || '';
  var s = style.toLowerCase();

  if(s.match(/vintage|retro|distressed/)) return 'vintage-graphic';
  if(s.match(/streetwear|street/)) return 'streetwear';
  if(s.match(/skate/)) return 'skate-brand';
  if(s.match(/metal|punk|grunge|gritty/)) return 'heavy-metal-poster';
  if(s.match(/airbrush|80s|neon retro/)) return 'retro-airbrush';
  if(s.match(/anime|manga/)) return 'anime-studio';
  if(s.match(/luxury|fashion|editorial/)) return 'luxury-editorial';
  if(s.match(/cinematic|photo|realistic|3d/)) return 'cinematic';

  // Audience-driven fallback
  if(audience.match(/bowler|sports team|gym|biker|surfer|skater/)) return 'premium-sportswear';

  return 'premium-sportswear'; // universal default — always premium
}

function showCreativeDirectorReveal(enhancement) {
  var panel = document.getElementById('cdReveal');
  var stepsEl = document.getElementById('cdSteps');
  if(!panel || !stepsEl) return;

  // Build steps from designIntent
  var steps = [];
  var intent = designIntent;

  if(intent.mascot || intent.teamName) {
    steps.push('Identified subject: ' + (intent.mascot || '') + (intent.teamName ? ' · "' + intent.teamName + '"' : ''));
  }
  if(enhancement && enhancement.energy) {
    steps.push('Emotional energy: ' + enhancement.energy);
  }
  if(enhancement && enhancement.elements && enhancement.elements.length > 0) {
    steps.push('Added: ' + enhancement.elements.slice(0,2).join(', '));
  }
  if(intent.style) {
    steps.push('Style: ' + intent.style);
  } else {
    steps.push('Render: premium sportswear');
  }
  steps.push('Optimizing for wearability & commercial appeal');

  stepsEl.innerHTML = '';
  panel.style.display = 'block';

  // Animate steps appearing one by one
  steps.forEach(function(step, i) {
    setTimeout(function() {
      var el = document.createElement('div');
      el.style.cssText = 'font-size:0.72rem;color:rgba(255,255,255,0.75);display:flex;align-items:baseline;gap:6px;opacity:0;transition:opacity 0.3s;';
      el.innerHTML = '<span style="color:#c41230;flex-shrink:0;">✓</span><span>' + step + '</span>';
      stepsEl.appendChild(el);
      setTimeout(function(){ el.style.opacity = '1'; }, 50);
    }, i * 400);
  });
}
}

// ── GENERATE ──
async function generate() {
  var idea = document.getElementById('promptInput').value.trim();
  if(!idea) { document.getElementById('promptInput').focus(); return; }

  var key = getKey();
  if(!key) { showKeyModal(); return; }

  var prompt;
  try {
    prompt = buildMobilePrompt(idea);
  } catch(e) {
    alert('Prompt build error: ' + e.message);
    return;
  }
  window._lastMobilePrompt = prompt;

  // Show loading
  document.getElementById('loadingText').textContent = 'GENERATING YOUR DESIGN...';
  document.getElementById('loadingSub').textContent = quality.toUpperCase() + ' quality · ~$' + COSTS[quality].toFixed(3);
  document.getElementById('loadingOverlay').classList.add('open');

  try {
    var res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+key},
      body: JSON.stringify({model:'gpt-image-1', prompt:prompt, n:1, size:'1024x1024', quality:currentQualityMode, output_format:'png'})
    });
    var data = await res.json();
    if(data.error) throw new Error(data.error.message);

    var imgData = data.data[0].b64_json || data.data[0].url;
    var imgUrl = imgData.startsWith('http') ? imgData : 'data:image/png;base64,' + imgData;

    document.getElementById('loadingOverlay').classList.remove('open');
    var cdr=document.getElementById('cdReveal');if(cdr){cdr.style.display='none';var cs=document.getElementById('cdSteps');if(cs)cs.innerHTML='';}
    document.getElementById('resultImg').src = imgUrl;
    document.getElementById('devBody').textContent = prompt;
    document.getElementById('devPanel').classList.add('show');
    document.getElementById('resultOverlay').classList.add('open');

  } catch(err) {
    document.getElementById('loadingOverlay').classList.remove('open');
    alert('Generation failed: ' + (err.message || 'Unknown error'));
  }
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('open');
}

function saveImg() {
  var src = document.getElementById('resultImg').src;
  if(!src) return;
  var a = document.createElement('a');
  a.href = src;
  a.download = 'dream-tees-design.png';
  a.click();
}

function toggleDev() {
  var body = document.getElementById('devBody');
  var arrow = document.getElementById('devArrow');
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
  arrow.textContent = body.style.display === 'none' ? '▶' : '▼';
}

// Enter key submits
document.getElementById('promptInput').addEventListener('keydown', function(e) {
  if(e.key === 'Enter' && e.metaKey) generate();
});
</script>
